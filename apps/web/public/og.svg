<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="DeFiPunk'd — Community-curated risk registry for the DeFi stack">
  <defs>
    <style>
      .bg { fill: #0a0d10; }
      .fg-w { fill: #f1f3f5; }
      .fg-r { fill: #b02230; }
      .fg-m { fill: #aab2bb; }
      .title { font-family: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 700; letter-spacing: -0.02em; }
      .subtitle { font-family: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 400; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630"/>

  <!-- Brand mark: 16x16 favicon glyph, scaled to 160px and centered with title baseline -->
  <g transform="translate(150 230) scale(11.25)">
    <rect width="16" height="16" rx="2.4" ry="2.4" fill="#b02230"/>
    <path d="M3 3h4v2h-2v6h2v2h-4zM13 3h-4v2h2v6h-2v2h4zM7 6h2v2h-2zM7 9h2v2h-2z" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="350" y="370" class="title fg-w" font-size="148">DeFiPunk'<tspan class="fg-r">d</tspan></text>

  <!-- Subtitle -->
  <text x="150" y="470" class="subtitle fg-m" font-size="36">Community-curated risk registry for the DeFi stack</text>
</svg>
