name: Validate DEFI@home submission

on:
  pull_request:
    paths:
      - "data/submissions/**"

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Collect changed submission files
        id: files
        uses: actions/github-script@v7
        with:
          script: |
            const res = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const files = res
              .filter((f) => f.status !== 'removed')
              .map((f) => f.filename)
              .filter((f) => f.startsWith('data/submissions/') && f.endsWith('.json'));
            core.setOutput('list', files.join(' '));
            core.setOutput('count', String(files.length));
            core.info(`found ${files.length} submission file(s): ${files.join(', ')}`);

      - name: Validate
        if: steps.files.outputs.count != '0'
        id: validate
        run: |
          pnpm --silent --filter @defipunkd/validator run validate -- --json ${{ steps.files.outputs.list }} > validate-report.json
          cat validate-report.json
        continue-on-error: true

      - name: Collect first-submission metadata for labels
        if: steps.files.outputs.count != '0'
        run: |
          node -e '
            const fs = require("fs");
            const report = JSON.parse(fs.readFileSync("validate-report.json", "utf8"));
            const meta = { ok: report.ok, slice: null, model: null, chat_url: null };
            for (const r of report.reports) {
              if (r.errors.length) continue;
              try {
                const raw = JSON.parse(fs.readFileSync(r.file, "utf8"));
                meta.slice = raw.slice || null;
                meta.model = raw.model || null;
                meta.chat_url = raw.chat_url || null;
                break;
              } catch (_) {}
            }
            fs.writeFileSync("validate-meta.json", JSON.stringify(meta));
          '

      - name: Save PR number
        if: steps.files.outputs.count != '0'
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload validation artifact
        if: steps.files.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: validate-report
          path: |
            validate-report.json
            validate-meta.json
            pr-number.txt
          retention-days: 7

      - name: Fail if validation failed
        if: steps.files.outputs.count != '0'
        run: |
          ok=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("validate-report.json","utf8")).ok)')
          if [ "$ok" != "true" ]; then
            echo "Submission validation failed; see PR comment posted by validate-comment workflow."
            exit 1
          fi
