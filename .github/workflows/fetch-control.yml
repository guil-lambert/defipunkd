name: Control-surface enrichment

on:
  schedule:
    # Thursdays 06:00 UTC, one day after Wednesday's sourcecode enrichment.
    - cron: "0 6 * * THU"
  workflow_dispatch:

concurrency:
  group: fetch-control
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch owner() + Safe-Transaction-Service metadata
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          pnpm --filter @defipunkd/enrichment exec \
            tsx src/cli/fetch-control.ts 2>&1 | tee fetch-log.txt

      - name: Build PR body
        run: |
          {
            echo "Control-surface enrichment run ${{ github.run_number }}."
            echo
            echo '## Run summary'
            echo
            echo '```'
            tail -20 fetch-log.txt
            echo '```'
            echo
            echo '## Diff'
            echo
            git --no-pager diff --stat -- 'data/enrichment/**/control.json' | tail -50
          } > fetch-pr-body.md

      - name: Open PR with control-surface diff
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(data): refresh enrichment/control"
          title: "chore(data): refresh enrichment/control — ${{ github.run_number }}"
          body-path: fetch-pr-body.md
          branch: enrichment/control-${{ github.run_number }}
          add-paths: "data/enrichment/**/control.json"
          delete-branch: true
