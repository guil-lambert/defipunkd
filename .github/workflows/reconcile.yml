name: DEFI@home reconcile

on:
  push:
    branches: [main]
    paths:
      - "data/submissions/**"
      - "data/assessments/**"
  workflow_dispatch:
    inputs:
      slug:
        description: "Specific slug to reconcile (empty = all changed)"
        required: false
      all:
        description: "Reconcile every slug with submissions"
        required: false
        default: "false"

concurrency:
  group: reconcile
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect changed slugs
        id: changes
        run: |
          set -e
          slugs=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.all }}" = "true" ]; then
            echo "mode=all" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.slug }}" ]; then
            echo "slugs=${{ github.event.inputs.slug }}" >> $GITHUB_OUTPUT
            echo "mode=explicit" >> $GITHUB_OUTPUT
            exit 0
          fi
          # push to main: diff against parent commit
          changed=$(git diff --name-only HEAD^ HEAD -- 'data/submissions/*/' 'data/assessments/*/' | \
            awk -F/ '{ print $3 }' | sort -u | tr '\n' ' ')
          echo "slugs=$changed" >> $GITHUB_OUTPUT
          echo "mode=diff" >> $GITHUB_OUTPUT
          echo "Changed slugs: $changed"

      - name: Run reconcile
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          if [ "${{ steps.changes.outputs.mode }}" = "all" ]; then
            pnpm --silent --filter @defipunkd/validator run reconcile -- --all
          else
            slugs="${{ steps.changes.outputs.slugs }}"
            if [ -z "$slugs" ]; then
              echo "No changed slugs, nothing to reconcile."
              exit 0
            fi
            pnpm --silent --filter @defipunkd/validator run reconcile -- $slugs
          fi

      - name: Open PR with master files
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "[reconcile] update DEFI@home master files"
          title: "[reconcile] DEFI@home master — ${{ github.run_number }}"
          body: |
            Automated reconcile using Claude Sonnet. Master files synthesize the per-slice quorum results and submission protocol_metadata into one canonical record per protocol.

            See workflow run for per-slug logs.
          branch: reconcile/auto-run-${{ github.run_number }}
          add-paths: data/master/**
          delete-branch: true
