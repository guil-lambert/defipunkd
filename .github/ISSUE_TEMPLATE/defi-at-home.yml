name: DEFI@home slice aggregation
description: Issue automatically opened by the quorum bot when the first submission lands for a (slug, slice) pair. Not intended for manual creation.
labels: [defi-at-home]
body:
  - type: markdown
    attributes:
      value: |
        This is the discussion anchor for one protocol slice in the DEFI@home flow. The quorum bot posts state updates here as submissions land. You can discuss the assessment, propose another run, or point out evidence gaps.
  - type: input
    id: slug
    attributes:
      label: Protocol slug
      description: DeFiLlama slug of the protocol being assessed.
      placeholder: lido
    validations:
      required: true
  - type: dropdown
    id: slice
    attributes:
      label: Slice
      options:
        - control
        - ability-to-exit
        - dependencies
        - access
        - verifiability
    validations:
      required: true
  - type: textarea
    id: state
    attributes:
      label: Current state
      description: Bot-populated summary of consensus / disagreement.
      value: |
        _Bot will post the current state as a comment._
